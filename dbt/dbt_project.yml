name: 'bip_demo'
version: '1.0.0'
config-version: 2

profile: 'bip_demo'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# 4-layer 모델 구조: staging → intermediate → marts → signals
models:
  bip_demo:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
    signals:
      +materialized: view
      +schema: signals

version: 2

models:
  - name: fct_stock_daily
    description: |
      **Gold — 종목×일자 와이드.** 시세 + 수급 + 해석 컬럼 포함.

      Grain: ticker × trade_date. 자세한 개념은 {{ doc('grain') }}, {{ doc('gold_table') }} 참고.
    columns:
      - name: ticker
        tests: [not_null]
      - name: trade_date
        description: '{{ doc("trade_date") }}'
        tests: [not_null]
      - name: close_price
        description: "종가 (한국 KRW, 미국 USD). 단위 통일은 별도 환율 컬럼 사용 필요."
        tests: [not_null]
      - name: foreign_direction
        description: '{{ doc("foreign_direction") }}'
        tests:
          - accepted_values:
              values: ['순매수', '순매도', '보합', '데이터없음']
      - name: change_label
        description: '{{ doc("change_label") }}'
        tests:
          - accepted_values:
              values: ['강한 상승', '상승', '보합', '하락', '강한 하락', '데이터없음']

  - name: fct_valuation_yearly
    description: |
      **Gold — 종목×연도 밸류에이션.** PER/PBR/ROE 계산값.

      Grain: ticker × fiscal_year. 자세한 개념은 {{ doc('grain') }}, {{ doc('gold_table') }} 참고.
    columns:
      - name: ticker
        tests:
          - not_null
          - relationships:
              to: ref('stg_stock_info')
              field: ticker
      - name: fiscal_year
        description: '{{ doc("fiscal_year") }}'
        tests: [not_null]
      - name: per_actual
        description: '{{ doc("per") }}'
      - name: pbr_actual
        description: '{{ doc("pbr") }}'
      - name: roe_actual
        description: '{{ doc("roe") }}'
      - name: debt_ratio
        description: '{{ doc("debt_ratio") }}'

version: 2

models:
  - name: stg_stock_info
    description: "정제된 종목 마스터 — is_korea 플래그 + stock_code 분리 추가"
    columns:
      - name: ticker
        description: "Yahoo Finance 포맷"
        tests:
          - not_null
          - unique
      - name: stock_name
        tests: [not_null]
      - name: is_korea
        description: "한국 종목 여부 (.KS/.KQ)"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: stock_code
        description: "6자리 종목코드 (한국만, 미국은 NULL)"

  - name: stg_stock_price
    description: "최근 90일 시세 + 등락률·거래대금 계산. Grain: 종목×일자"
    columns:
      - name: ticker
        tests:
          - not_null
          - relationships:
              to: ref('stg_stock_info')
              field: ticker
      - name: trade_date
        tests: [not_null]
      - name: close_price
        tests: [not_null]
      - name: change_pct
        description: "전일 대비 등락률 (%). 첫 거래일은 NULL"

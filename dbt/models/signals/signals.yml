version: 2

models:
  - name: signal_valuation
    description: |
      **Curated View — 밸류에이션 Boolean Flag.**

      LLM 친화적 의미 필터링. 자세한 개념은 {{ doc('curated_view') }}, {{ doc('boolean_flag') }} 참고.
    columns:
      - name: ticker
        tests: [not_null]
      - name: fiscal_year
        description: '{{ doc("fiscal_year") }}'
        tests: [not_null]
      - name: is_value_stock
        description: '{{ doc("value_stock") }}'
      - name: is_high_roe
        description: '{{ doc("high_roe") }}'
      - name: is_quality_stock
        description: '{{ doc("quality_stock") }}'
      - name: is_high_debt
        description: '{{ doc("high_debt") }}'
